<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Weather App - Previsão Climática</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            background-color: #0b0f19;
            color: #f8fafc;
        }

        .weather-card {
            background-color: #111827;
            border: 1px solid #1f2937;
            border-radius: 1rem;
            max-width: 450px;
            width: 100%;
            padding: 2rem;
        }

        .info-box {
            background-color: #1f293b;
            border: 1px solid #334155;
        }

        .form-control::placeholder {
            color: #6c757d;
        }

        .form-control:focus {
            background-color: #1f293b;
            border-color: #0dcaf0;
            color: white;
            box-shadow: none;
        }
    </style>

</head>

<body class="d-flex min-vh-100 align-items-center justify-content-center p-3">

    <div class="weather-card shadow-lg">
        <h2 class="text-center text-info fw-bold mb-4"><i class="fa-solid fa-cloud-sun me-2"></i>Weather App</h2>

        <!-- Formulário de Busca -->
        <form method="POST" class="d-flex gap-2 mb-4">
            <input type="text" name="cidade" placeholder="Digite uma cidade..."
                class="form-control bg-dark text-white border-secondary py-2" required>
            <button type="submit" class="btn btn-info text-dark fw-bold px-4">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </form>

        <!-- Feedback de Erro -->
        <!-- Esse bloco deve aparecer se algum erro for detectado-->
        <div class="alert alert-danger text-center mb-4" role="alert">
            <i class="fa-solid fa-circle-exclamation me-2"></i> MENSAGEM DE ERRO
        </div>

        <!-- Bloco de Clima Encontrado -->
        <!-- Esse bloco deve aparecer se clima for encontrado -->
        <div class="text-center mt-4">
            <h3 class="fw-bold text-white"><i class="fa-solid fa-location-dot text-info me-2"></i>Xique-Xique, BA</h3>
            <p class="text-info text-capitalize mb-4 mt-1">Ensolarado</p>
            <div class="display-2 fw-bold text-white mb-4">-18.0°C</div>

            <div class="row g-3 border-top border-secondary pt-4">
                <div class="col-6">
                    <div class="info-box p-3 rounded">
                        <i class="fa-solid fa-droplet text-primary mb-2 fs-4"></i>
                        <span class="d-block small text-uppercase mb-1">Umidade</span>
                        <span class="fs-5 fw-bold text-white">72%</span>
                    </div>
                </div>
                <div class="col-6">
                    <div class="info-box p-3 rounded">
                        <i class="fa-solid fa-wind text-success mb-2 fs-4"></i>
                        <span class="d-block small text-uppercase mb-1">Vento</span>
                        <!-- Multiplicar a velocidade do vento por 3.6 e arredondar 1 casa decimal -->
                        <span class="fs-5 fw-bold text-white">10.0 km/h</span>
                    </div>
                </div>
            </div>
        </div>

    </div>

</body>

</html>
